name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Compile Analytical Solver
      run: g++ -std=c++17 -O3 -fopenmp apps/solver_analytical.cpp -o apps/solver_analytical.exe

    - name: Compile Numerical Solver
      run: g++ -std=c++17 -O3 -fopenmp apps/solver_numerical.cpp -o apps/solver_numerical.exe
      
    - name: Run Basic Diagnostics
      run: |
        # Ensure solvers can run correctly on a tiny chunk without crashing
        ./apps/solver_analytical.exe 0 10
        ./apps/solver_numerical.exe 0 10
